project:
  render: 
     - index.qmd
     - team/index.qmd
     - repro_efforts/index.qmd
  type: website   
  output-dir: docs

website:
  title: "CORTRE"  
  page-navigation: true
  favicon: img/logo.png   

  page-footer:
    border: true
    background: light
    left: | 
      Made by the [Center for Reproducible Science and Research Synthesis](https://www.crs.uzh.ch/en.html) \  
      Source code on [![](https://github.githubassets.com/assets/GitHub-Logo-ee398b662d42.png){fig-alt="Git" width=55px}](https://github.com/cortre/cortre.github.io) 
    right: This is a website under the [CC BY international license 4.0](https://creativecommons.org/licenses/by/4.0/)                    

  sidebar:   
    #title: "CORTRE"
    search: false
    logo: img/logo.png
    collapse-level: 2
    contents: 
      - index.qmd
      - team/index.qmd

format:    
  html:        
    number-depth: 2 
    email-obfuscation: javascript
    css: styles.css
    theme:
      light: flatly
      dark: darkly   
    code-link: true    
    author-meta: "Center for Reproducible Science and Research Synthesis"
    callout-appearance: default
    callout-icon: false 
    code-overflow: wrap   

freeze: auto
